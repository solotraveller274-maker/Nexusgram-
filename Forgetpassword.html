<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #a1c4fd, #c2e9fb); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 350px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); padding: 30px; border-radius: 40px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: none; border-radius: 15px; background: rgba(255,255,255,0.7); box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; }
        .back-link { margin-top: 20px; display: block; color: #2563eb; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Reset Password</h2>
    <input type="email" id="reset-email" placeholder="Enter your email">
    <button class="btn" onclick="sendResetLink()">Send Reset Link</button>  
<a href="index.html" style="display:block; margin-top:20px; color:#2563eb; text-align:center;">Back to Login</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCKmCKZ-aTnSCokuMQ7Mz2mgRl7MuyfRPw",
        authDomain: "nexusgram-1.firebaseapp.com",
        projectId: "nexusgram-1",
        storageBucket: "nexusgram-1.firebasestorage.app",
        messagingSenderId: "861550995018",
        appId: "1:861550995018:web:e246dbf13f091ac55de8b3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.sendResetLink = function() {
        const email = document.getElementById('reset-email').value;
        sendPasswordResetEmail(auth, email)
            .then(() => alert("Reset link sent to your email!"))
            .catch((error) => alert("Error: " + error.message));
    }
</script>
</body>
</html>
